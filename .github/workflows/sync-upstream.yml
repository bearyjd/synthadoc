name: Sync fork with upstream

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

jobs:
  sync:
    name: Merge upstream/main → fork/main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/axoviq-ai/synthadoc.git
          git fetch upstream main

      - name: Fast-forward merge upstream/main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          if [ "$BEHIND" = "0" ]; then
            echo "Fork is already up to date with upstream — nothing to merge"
            exit 0
          fi
          AHEAD=$(git rev-list --count upstream/main..HEAD)
          if [ "$AHEAD" != "0" ]; then
            echo "::warning::Fork is $AHEAD commits ahead and $BEHIND commits behind upstream — manual merge required"
            exit 1
          fi
          git merge --ff-only upstream/main

      - name: Push to fork
        if: ${{ success() }}
        run: git push origin main
